name: Deploy with Cache Busting

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add cache-busting version to CSS and JS
        run: |
          VERSION=${GITHUB_SHA::7}

          find . -name "*.html" -type f -print0 | xargs -0 sed -i -E "s#(href=\"[^\"]+\.css)(\")#\1?v=$VERSION\2#g"
          find . -name "*.html" -type f -print0 | xargs -0 sed -i -E "s#(src=\"[^\"]+\.js)(\")#\1?v=$VERSION\2#g"

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
